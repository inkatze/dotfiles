pre-commit:
  parallel: true
  commands:
    yamllint:
      glob: "*.{yml,yaml}"
      run: yamllint .
    ansible-lint:
      glob: "*.{yml,yaml}"
      run: ansible-lint
    syntax-check:
      glob: "*.{yml,yaml}"
      run: ansible-playbook main.yml --syntax-check
    skill-contracts:
      glob: "roles/osx/files/claude/commands/*.md"
      run: roles/osx/files/claude/scripts/skill-contracts.sh
    fish-lint:
      glob: "*.fish"
      run: |
        command -v fish_indent >/dev/null || { echo "fish-lint: fish_indent not found on PATH" >&2; exit 1; }
        command -v fish >/dev/null || { echo "fish-lint: fish not found on PATH" >&2; exit 1; }
        for f in {staged_files}; do
          fish_indent --check "$f" || exit 1
          fish -n -- "$f" || exit 1
        done
    baseline-plaintext-guard:
      glob: "specs/metrics-baseline/snapshots/baseline-*"
      run: |
        pattern='^specs/metrics-baseline/snapshots/baseline-.*\.md$'
        plaintext=$(git diff --cached --name-only \
          | grep "$pattern" | grep -v '\-rough\.md$')
        if [ -n "$plaintext" ]; then
          echo "ERROR: refusing to commit plaintext baseline snapshot(s):"
          echo "$plaintext"
          echo "Encrypt with age -R specs/metrics-baseline/snapshots/recipients.txt"
          echo "and commit only baseline-*.md.age. See specs/metrics-baseline/snapshots/README.md."
          exit 1
        fi
