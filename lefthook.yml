pre-commit:
  parallel: true
  commands:
    yamllint:
      glob: "*.{yml,yaml}"
      run: yamllint .
    ansible-lint:
      glob: "*.{yml,yaml}"
      run: ansible-lint
    syntax-check:
      glob: "*.{yml,yaml}"
      run: ansible-playbook main.yml --syntax-check
    baseline-plaintext-guard:
      run: |
        pattern='^specs/metrics-baseline/snapshots/baseline-.*\.md$'
        plaintext=$(git diff --cached --name-only \
          | grep "$pattern" | grep -v '\-rough\.md$')
        if [ -n "$plaintext" ]; then
          echo "ERROR: refusing to commit plaintext baseline snapshot(s):"
          echo "$plaintext"
          echo "Encrypt with age -R specs/metrics-baseline/snapshots/recipients.txt"
          echo "and commit only baseline-*.md.age. See specs/metrics-baseline/snapshots/README.md."
          exit 1
        fi
