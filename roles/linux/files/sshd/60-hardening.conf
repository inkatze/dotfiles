# Managed by the dotfiles `linux` role (specs/linux-migration, REQ-E1.1).
# Do not edit on the host: the repo role is the single writer. A drop-in in
# sshd_config.d/ overrides the distro default so a package upgrade to
# /etc/ssh/sshd_config cannot silently re-open password auth.
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PubkeyAuthentication yes
PermitRootLogin no
