---

# 1Password CLI (`op`) so post-wipe tasks can retrieve their secrets from the
# vault at use time (REQ-F1.2). Package only; `op signin` is an operator step.
- name: Add the 1Password apt signing key
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /usr/share/keyrings/1password-archive-keyring.asc
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [linux]

- name: Add the 1Password CLI apt repository
  ansible.builtin.deb822_repository:
    name: 1password
    types: [deb]
    uris: https://downloads.1password.com/linux/debian/amd64
    suites: stable
    components: [main]
    signed_by: /usr/share/keyrings/1password-archive-keyring.asc
  become: true
  tags: [linux]

- name: Install the 1Password CLI
  ansible.builtin.apt:
    name: 1password-cli
    state: present
    update_cache: true
  become: true
  tags: [linux]
