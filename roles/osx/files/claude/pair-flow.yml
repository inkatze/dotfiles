# Config for the dotfiles-local review surfaces (read via
# pair-flow-config.sh). Tracked in dotfiles, materialized at
# ~/.claude/pair-flow.yml. Per-repo overrides live in ~/.claude/pair-flow.local.yml
# (agent-maintained, host-local, NOT tracked here). See D-19 in
# specs/pair-flow/design.md.
#
# The spec-driven pipeline (/orchestrate, /execute-task, /spec-*) now ships as
# the planwright plugin (installed via roles/osx/tasks/osx.yml) and reads its
# own config through planwright's own config mechanism; the orchestrator lock
# threshold that used to live here moved with it.

# Backends used by /panel-review and /panel-pairing when --backends is not set.
# Per D-6: codex is the tracked default. Personal/alt hosts override to
# [gemini] via pair-flow.local.yml (user does not fund OpenAI for personal use).
panel-backends: [codex]
