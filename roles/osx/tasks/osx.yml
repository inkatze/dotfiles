---

- name: Install Claude Code CLI
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
  changed_when: false
  tags: [osx]

- name: Update Claude Code CLI
  ansible.builtin.command:
    cmd: "{{ ansible_env.HOME }}/.local/bin/claude update"
  changed_when: false
  tags: [osx, update]

- name: Create Claude configuration directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude"
    state: directory
    mode: '0755'
  tags: [osx]

- name: Symlink Claude environment documentation
  ansible.builtin.file:
    src: "{{ ansible_env.PWD }}/roles/osx/files/CLAUDE.md"
    dest: "{{ ansible_env.HOME }}/.claude/CLAUDE.md"
    state: link
  tags: [osx]

- name: Ensure Claude settings.json contains managed settings
  ansible.builtin.shell:
    cmd: |
      set -e
      file="{{ ansible_env.HOME }}/.claude/settings.json"
      managed="{{ ansible_env.PWD }}/roles/osx/files/claude/settings.json"
      [ ! -f "$file" ] && echo '{}' > "$file"
      current=$(cat "$file")
      updated=$(jq -s '.[0] * .[1]' "$file" "$managed")
      if [ "$current" = "$updated" ]; then
        echo "OK"
      else
        echo "$updated" > "$file"
        echo "CHANGED"
      fi
  register: osx_claude_settings
  changed_when: "'CHANGED' in osx_claude_settings.stdout"
  tags: [osx]

- name: Symlink Claude custom commands
  ansible.builtin.file:
    src: "{{ ansible_env.PWD }}/roles/osx/files/claude/commands"
    dest: "{{ ansible_env.HOME }}/.claude/commands"
    state: link
  tags: [osx]

- name: Symlink Claude hook scripts
  ansible.builtin.file:
    src: "{{ ansible_env.PWD }}/roles/osx/files/claude/scripts"
    dest: "{{ ansible_env.HOME }}/.claude/scripts"
    state: link
  tags: [osx]

- name: Symlink pair-flow defaults
  ansible.builtin.file:
    src: "{{ ansible_env.PWD }}/roles/osx/files/claude/pair-flow.yml"
    dest: "{{ ansible_env.HOME }}/.claude/pair-flow.yml"
    state: link
  tags: [osx]

# planwright is the extraction of pair-flow's generalizable core (specs at
# ~/dev/planwright). Its "writer" (scripts/install.sh, REQ-I1.2) materializes
# the framework into the planwright-owned namespace under ~/.claude
# (planwright/doctrine, planwright/scripts, skills/<name>) and touches nothing
# it does not own. We invoke planwright's own installer rather than vendoring a
# copy, keeping the planwright repo the single source of truth. The migrated
# slash commands (orchestrate, execute-task, spec-kickoff, spec-draft,
# self-review, polish, resume) are retired from the pair-flow commands/ dir
# below; planwright now supplies them as skills. The review-workflow commands
# planwright does not ship (panel-*, copilot-*, peer-review, code-review) stay.
- name: Install planwright framework via its writer
  ansible.builtin.command:
    cmd: "{{ ansible_env.HOME }}/dev/planwright/scripts/install.sh"
  environment:
    CLAUDE_DIR: "{{ ansible_env.HOME }}/.claude"
  # The writer refresh-copies on every run and emits no changed/unchanged
  # signal, so its output cannot drive idempotent change reporting. Report ok
  # rather than match a phantom token; failed_when defaults to rc != 0.
  changed_when: false
  # `is exists` runs on the controller; for these dotfiles controller == target
  # (run locally via mise run osx), so probing the target path here is sound.
  when: "(ansible_env.HOME ~ '/dev/planwright/scripts/install.sh') is exists"
  tags: [osx]

# Pair-flow cross-session inbox substrate (REQ-F1.1 in specs/pair-flow/).
# Each Claude session writes a JSON file named {host}-{session-uuid}.json
# under this directory; tmux dashboard + status segment read from it.
# Mode 0700 because entries embed working-tree paths and branch names that
# are not sensitive but also not meant for other users on the machine.
# Sync mechanism (iCloud Drive vs Syncthing) is left to the user; either
# works because each file is a single-writer, atomic-rename, sub-1KB JSON.
- name: Ensure Claude inbox directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude/inbox"
    state: directory
    mode: '0700'
  tags: [osx]

- name: Create Cursor rules directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.cursor/rules"
    state: directory
    mode: '0755'
  tags: [osx]

- name: Symlink Cursor MDC rules file
  ansible.builtin.file:
    src: "{{ ansible_env.PWD }}/roles/osx/files/environment.mdc"
    dest: "{{ ansible_env.HOME }}/.cursor/rules/environment.mdc"
    state: link
  tags: [osx]

- name: Showing Library folder
  ansible.builtin.command:
    cmd: chflags nohidden ~/Library
  changed_when: false
  tags: [osx]

- name: Applying OSX defaults
  community.general.osx_defaults:
    domain: "{{ item.domain }}"
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
  with_items: "{{ osx_defaults }}"
  tags: [osx]

# Idempotency is broken :(
- name: Applying lists OSX defaults
  community.general.osx_defaults:
    domain: "{{ item.domain }}"
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
  with_items: "{{ osx_list_defaults }}"
  changed_when: false
  tags: [osx]
