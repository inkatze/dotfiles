---

- name: Install Claude Code CLI
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
  changed_when: false
  tags: [osx]

- name: Update Claude Code CLI
  ansible.builtin.command:
    cmd: "{{ ansible_env.HOME }}/.local/bin/claude update"
  changed_when: false
  tags: [osx, update]

- name: Create Claude configuration directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude"
    state: directory
    mode: '0755'
  tags: [osx]

- name: Symlink Claude environment documentation
  ansible.builtin.file:
    src: "{{ ansible_env.PWD }}/roles/osx/files/CLAUDE.md"
    dest: "{{ ansible_env.HOME }}/.claude/CLAUDE.md"
    state: link
  tags: [osx]

- name: Ensure Claude settings.json contains managed settings
  ansible.builtin.shell:
    cmd: |
      set -e
      file="{{ ansible_env.HOME }}/.claude/settings.json"
      managed="{{ ansible_env.PWD }}/roles/osx/files/claude/settings.json"
      [ ! -f "$file" ] && echo '{}' > "$file"
      current=$(cat "$file")
      updated=$(jq -s '.[0] * .[1]' "$file" "$managed")
      if [ "$current" = "$updated" ]; then
        echo "OK"
      else
        echo "$updated" > "$file"
        echo "CHANGED"
      fi
  register: osx_claude_settings
  changed_when: "'CHANGED' in osx_claude_settings.stdout"
  tags: [osx]

- name: Symlink Claude custom commands
  ansible.builtin.file:
    src: "{{ ansible_env.PWD }}/roles/osx/files/claude/commands"
    dest: "{{ ansible_env.HOME }}/.claude/commands"
    state: link
  tags: [osx]

- name: Symlink Claude hook scripts
  ansible.builtin.file:
    src: "{{ ansible_env.PWD }}/roles/osx/files/claude/scripts"
    dest: "{{ ansible_env.HOME }}/.claude/scripts"
    state: link
  tags: [osx]

# Cleanup for the 2026-07-13 repo-class / pair-flow-config.sh retirement
# (see specs/pair-flow/tasks.md Completed). Any host that previously ran the
# now-deleted "Symlink pair-flow defaults" task has a dangling symlink here
# (its target, roles/osx/files/claude/pair-flow.yml, no longer exists in the
# tree). state: absent on an already-missing path is a no-op, so this is
# safe on a fresh machine too.
- name: Remove dangling pair-flow.yml symlink (repo-class retirement cleanup)
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude/pair-flow.yml"
    state: absent
  tags: [osx]

# Same retirement: the inbox substrate (specs/pair-flow/tasks.md Completed,
# "Retire Task 3") deleted inbox-sweep.sh, the only thing that ever cleaned
# up ~/.claude/inbox/ entries, without removing the directory itself. Any
# host that ran an old Claude Code session has stale {host}-{uuid}.json
# entries here with nothing left to sweep them.
- name: Remove orphaned inbox directory (cross-session inbox retirement cleanup)
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude/inbox"
    state: absent
  tags: [osx]

# planwright is the extraction of pair-flow's generalizable core, now a public
# Claude Code plugin. We install it through the standard marketplace flow rather
# than vendoring a copy or running its ~/.claude/ writer: add the repo as a
# marketplace, then install the plugin (both named planwright). HTTPS source so
# a fresh machine needs no SSH key now that the repo is public. The plugin
# auto-wires its own hooks (SessionStart tool-discovery, PostToolUse
# tasks-pr-sync) via its hooks/hooks.json resolved against CLAUDE_PLUGIN_ROOT, so
# settings.json no longer wires them by hand, and doctrine docs/scripts resolve
# plugin-relative at runtime. Updates are handled by upgrade.yml via
# `claude plugin update`. The migrated slash commands (orchestrate,
# execute-task, spec-kickoff, spec-draft, self-review, polish, resume) are
# retired from the pair-flow commands/ dir below; planwright supplies them as
# skills. The review-workflow commands planwright does not ship (panel-*,
# copilot-*, peer-review, code-review) stay. Both tasks are idempotent (rc 0 on
# re-run, output reports "already"); CI-guarded because the matrix has no
# `claude` CLI.
- name: Add planwright plugin marketplace
  ansible.builtin.command:
    cmd: "{{ ansible_env.HOME }}/.local/bin/claude plugin marketplace add https://github.com/inkatze/planwright.git"
  register: osx_planwright_marketplace
  changed_when: "'already' not in osx_planwright_marketplace.stdout"
  when: lookup('ansible.builtin.env', 'CI', default='') == ''
  tags: [osx]

- name: Install planwright plugin
  ansible.builtin.command:
    cmd: "{{ ansible_env.HOME }}/.local/bin/claude plugin install planwright@planwright --scope user"
  register: osx_planwright_install
  changed_when: "'already' not in osx_planwright_install.stdout"
  when: lookup('ansible.builtin.env', 'CI', default='') == ''
  tags: [osx]

- name: Create Cursor rules directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.cursor/rules"
    state: directory
    mode: '0755'
  tags: [osx]

- name: Symlink Cursor MDC rules file
  ansible.builtin.file:
    src: "{{ ansible_env.PWD }}/roles/osx/files/environment.mdc"
    dest: "{{ ansible_env.HOME }}/.cursor/rules/environment.mdc"
    state: link
  tags: [osx]

- name: Showing Library folder
  ansible.builtin.command:
    cmd: chflags nohidden ~/Library
  changed_when: false
  tags: [osx]

- name: Applying OSX defaults
  community.general.osx_defaults:
    domain: "{{ item.domain }}"
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
  with_items: "{{ osx_defaults }}"
  tags: [osx]

# Idempotency is broken :(
- name: Applying lists OSX defaults
  community.general.osx_defaults:
    domain: "{{ item.domain }}"
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
  with_items: "{{ osx_list_defaults }}"
  changed_when: false
  tags: [osx]
