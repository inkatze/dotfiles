---

- name: Install common packages from Brewfile
  ansible.builtin.command:
    cmd: brew bundle install --no-upgrade --file={{ ansible_env.PWD }}/Brewfile
  register: osx_brew_bundle_common
  changed_when: "'Installing' in osx_brew_bundle_common.stdout"
  tags: [osx]

- name: Install host-specific packages from Brewfile
  ansible.builtin.command:
    cmd: brew bundle install --no-upgrade --file={{ ansible_env.PWD }}/Brewfile.{{ inventory_hostname }}
  register: osx_brew_bundle_host
  changed_when: "'Installing' in osx_brew_bundle_host.stdout"
  tags: [osx]

- name: Sync GitHub MCP server registration with Claude Code
  ansible.builtin.command:
    cmd: "{{ ansible_env.PWD }}/scripts/claude-mcp-sync-github.sh"
  register: osx_claude_mcp_github
  changed_when: "'CHANGED' in osx_claude_mcp_github.stdout"
  when: lookup('ansible.builtin.env', 'CI', default='') == ''
  tags: [osx]

- name: Check Ollama service state
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      brew services list | awk '/^ollama / {print $2}'
  register: osx_ollama_service_state
  changed_when: false
  tags: [osx, ollama]

- name: Start Ollama service
  ansible.builtin.command:
    cmd: brew services start ollama
  when: osx_ollama_service_state.stdout != 'started'
  tags: [osx, ollama]

- name: List installed Ollama models
  ansible.builtin.command:
    cmd: ollama list
  register: osx_ollama_models
  changed_when: false
  tags: [osx, ollama-models]

- name: Pull Ollama panel-backend models
  ansible.builtin.command:
    cmd: "ollama pull {{ item }}"
  loop:
    - qwen2.5-coder:32b
    - deepseek-r1:32b
  when: item not in osx_ollama_models.stdout
  tags: [osx, ollama-models]
