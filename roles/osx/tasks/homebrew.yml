---

- name: Install common packages from Brewfile
  ansible.builtin.command:
    cmd: brew bundle install --no-upgrade --file={{ ansible_env.PWD }}/Brewfile
  register: osx_brew_bundle_common
  changed_when: "'Installing' in osx_brew_bundle_common.stdout"
  tags: [osx]

- name: Install host-specific packages from Brewfile
  ansible.builtin.command:
    cmd: brew bundle install --no-upgrade --file={{ ansible_env.PWD }}/Brewfile.{{ inventory_hostname }}
  register: osx_brew_bundle_host
  changed_when: "'Installing' in osx_brew_bundle_host.stdout"
  tags: [osx]

- name: Sync GitHub MCP server registration with Claude Code
  ansible.builtin.command:
    cmd: "{{ ansible_env.PWD }}/scripts/claude-mcp-sync-github.sh"
  register: osx_claude_mcp_github
  changed_when: "'CHANGED' in osx_claude_mcp_github.stdout"
  when: lookup('ansible.builtin.env', 'CI', default='') == ''
  tags: [osx]

# Ollama daemon + model management lives on the work host only.
# Personal/alt hosts run the panel commands as clients and reach the
# work host's Ollama via OLLAMA_BASE_URL (set in fish conf.d/ollama.fish).

- name: Check Ollama service state
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      brew services list | awk '/^ollama / {print $2}'
  register: osx_ollama_service_state
  changed_when: false
  when: inventory_hostname == 'work'
  tags: [osx, ollama]

- name: Read current OLLAMA_HOST from Ollama LaunchAgent plist
  ansible.builtin.command:
    cmd: >-
      /usr/libexec/PlistBuddy -c "Print :EnvironmentVariables:OLLAMA_HOST"
      {{ ansible_env.HOME }}/Library/LaunchAgents/homebrew.mxcl.ollama.plist
  register: osx_ollama_host_current
  failed_when: false
  changed_when: false
  when: inventory_hostname == 'work'
  tags: [osx, ollama]

- name: Set OLLAMA_HOST=0.0.0.0:11434 in Ollama LaunchAgent plist
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      plist="{{ ansible_env.HOME }}/Library/LaunchAgents/homebrew.mxcl.ollama.plist"
      if /usr/libexec/PlistBuddy -c "Print :EnvironmentVariables:OLLAMA_HOST" "$plist" >/dev/null 2>&1; then
        /usr/libexec/PlistBuddy -c "Set :EnvironmentVariables:OLLAMA_HOST 0.0.0.0:11434" "$plist"
      else
        /usr/libexec/PlistBuddy -c "Add :EnvironmentVariables:OLLAMA_HOST string 0.0.0.0:11434" "$plist"
      fi
  when:
    - inventory_hostname == 'work'
    - (osx_ollama_host_current.stdout | default('') | trim) != '0.0.0.0:11434'
  register: osx_ollama_host_plist_set
  changed_when: osx_ollama_host_plist_set.rc == 0
  tags: [osx, ollama]

- name: Export OLLAMA_HOST into the current launchd session
  ansible.builtin.command:
    cmd: launchctl setenv OLLAMA_HOST 0.0.0.0:11434
  changed_when: false
  when: inventory_hostname == 'work'
  tags: [osx, ollama]

- name: Start Ollama service
  ansible.builtin.command:
    cmd: brew services start ollama
  when:
    - inventory_hostname == 'work'
    - osx_ollama_service_state.stdout != 'started'
  tags: [osx, ollama]

- name: Restart Ollama service to pick up OLLAMA_HOST change
  ansible.builtin.command:
    cmd: brew services restart ollama
  when:
    - inventory_hostname == 'work'
    - osx_ollama_host_plist_set is changed
  tags: [osx, ollama]

- name: List installed Ollama models
  ansible.builtin.command:
    cmd: ollama list
  register: osx_ollama_models
  changed_when: false
  when: inventory_hostname == 'work'
  tags: [osx, ollama-models]

- name: Pull Ollama panel-backend models
  ansible.builtin.command:
    cmd: "ollama pull {{ item }}"
  loop:
    - qwen2.5-coder:32b
    - deepseek-r1:32b
  when:
    - inventory_hostname == 'work'
    - item not in osx_ollama_models.stdout
  tags: [osx, ollama-models]
