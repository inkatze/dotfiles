# Plugins ->>1
# set -g @plugin 'jimeh/tmux-themepack'
# dracula removed 2026-07-17 — replaced by the native Catppuccin-Mocha status bar
# in the Status bar section below. Its cpu/ram/gpu #() segments polled every tick
# and were the periodic status-bar flash source.
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'schasse/tmux-jump'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible' # Sensible default settings
set -g @plugin 'tmux-plugins/tmux-copycat' # File search stuff
set -g @plugin 'tmux-plugins/tmux-urlview'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-sidebar'

# Theme ->>2
set -g default-terminal 'tmux-256color'
set -sa terminal-overrides ',*256col*:RGB'

# Shell umask guard: a long-lived tmux server freezes the umask of whatever
# started it. Observed 2026-06-15: this server inherited umask 0117, so new
# directories were created 0660 (no owner execute) and Claude Code's Bash
# scratch-dir mkdir failed with EACCES in every pane launched as a bare `claude`.
# Reset the umask for every new pane regardless of the server's inherited value,
# then exec a login shell ($SHELL is fish here).
set -g default-command 'umask 022; exec $SHELL -l'

# Allow passthrough for kitty notifications
set -g allow-passthrough all

# Status bar ->>1
# automatic-rename ON. Counter-intuitively, turning it OFF (an earlier commit
# did, trying to stop a title-escape redraw storm) is what caused the real,
# long-running problem: a constant status-bar flash whenever Claude Code renders
# its TUI. Confirmed by a cross-machine A/B on identical tmux 3.7b + kitty 0.47.4
# + ~10 Claude fleets: the work box at commit 790ff0b (automatic-rename on) never
# flashed; this box with it off flashed constantly. With it on, tmux does not
# full-redraw the status line on every pane render. Manual window names are
# preserved: `rename-window` sets a per-window automatic-rename-off flag, so
# named windows never auto-rename; only unnamed new windows pick up the command
# name (same behavior as the work box).
set -g automatic-rename on
# allow-rename off: fish's default fish_title reflects the command line as
# you type it via the title escape sequence. With allow-rename on, tmux used
# that to live-rename the window, echoing whatever you were typing into the
# status bar.
set -g allow-rename off
# monitor-bell off: tmux's default (monitor-bell on + bell-action any) makes
# every terminal BEL set the window's bell flag, and a window-flag change forces
# a status-line redraw. Claude Code rings the bell on notifications and fish
# bells on ambiguous completion, so across the fleet windows the bar flashed
# randomly. We don't use the per-window "needs attention" bell indicator, so
# drop bell monitoring entirely.
set -g monitor-bell off
# 60s: the bar shows a minute-resolution clock and no live metrics, so it only
# needs to tick once a minute. Fewer forced redraws = less flash surface.
set -g status-interval 60

# --- Native status bar (Catppuccin Mocha), minimal-underline style ---
# Replaces the old dracula theme and its cpu/ram/gpu #() shell segments (which
# polled every tick and were the periodic-flash source). This bar runs ZERO
# subprocesses: it redraws only on real state changes and the clock tick.
# Colors are Catppuccin Mocha hex, inlined — no theme-plugin dependency.
set -g status-style "bg=#181825,fg=#cdd6f4"
set -g status-justify left
# Session name (== host, per the one-session-per-host workflow), green, on the left.
set -g status-left "#[fg=#a6e3a1,bold] #S #[default]"
set -g status-left-length 40
# Window list: inactive muted grey; current window blue, bold, underlined. #W is
# the process name for unnamed windows (automatic-rename), or the fixed name once
# you rename-window (e.g. the named windows tm.fish creates).
set -g window-status-format         "#[fg=#6c7086]#I #W"
set -g window-status-current-format "#[fg=#89b4fa,bold]#[underscore]#I #W#[nounderscore]"
set -g window-status-separator      "   "
# Right: muted hostname, brighter clock.
set -g status-right "#[fg=#6c7086]#H #[fg=#585b70]· #[fg=#cdd6f4]%a %d %b  %H:%M #[default]"
set -g status-right-length 60

# `prefix :` command prompt. fill=<color> is REQUIRED: without it the prompt
# clears only the columns under the typed text and the rest of the status bar
# bleeds through (looks like typing over the status line — tmux's own default
# carries fill=yellow for exactly this reason). Blue = insert, peach = vi-normal.
set -g message-style         "bg=#181825,fg=#89b4fa,bold,fill=#181825"
set -g message-command-style "bg=#181825,fg=#fab387,bold,fill=#181825"

# Bindings ->> 1

# Remap prefix from 'C-b' to 'M-a' ->>2
unbind C-b
set-option -g prefix M-a
bind-key C-a send-prefix

# Switch panes using Alt-arrow without prefix ->>2
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Cycle windows using Alt-Shift-arrow without prefix ->>2
bind -n M-S-Left previous-window
bind -n M-S-Right next-window

# Split panes using | and - ->>2
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Start index at 1
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Enable mouse mode ->>1
set -g mouse on

# Update environment variables when attaching (SSH agent, kitty socket)
set-option -g update-environment "SSH_AUTH_SOCK KITTY_LISTEN_ON KITTY_PID KITTY_WINDOW_ID"

# Vi copy mode ->>1
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Run tpm ->>1
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
run -b '~/.tmux/plugins/tpm/tpm'

# Syncronize panes shortcut ->>
bind Z setw synchronize-panes
