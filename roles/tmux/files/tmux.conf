# Plugins ->>1
# set -g @plugin 'jimeh/tmux-themepack'
set -g @plugin 'dracula/tmux'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'schasse/tmux-jump'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible' # Sensible default settings
set -g @plugin 'tmux-plugins/tmux-copycat' # File search stuff
set -g @plugin 'tmux-plugins/tmux-urlview'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-sidebar'

# Theme ->>2
set -g default-terminal 'tmux-256color'
set -sa terminal-overrides ',*256col*:RGB'

# Allow passthrough for kitty notifications
set -g allow-passthrough all
# GPU segment is a custom dracula plugin (see roles/tmux/files/scripts/
# gpu-usage.sh). Dracula's `custom:` slot concatenates onto its own
# scripts/ dir, so we walk back out via .. to the ~/.tmux/scripts symlink.
# The inbox segment is a second custom plugin from the pair-flow inbox
# substrate (REQ-F2.2 in specs/pair-flow/): it shows ⚠N ●N ◆N counts of
# awaiting-input / working / draft-pr-ready sessions across hosts.
set -g @dracula-plugins "cpu-usage ram-usage custom:../../../scripts/gpu-usage.sh custom:../../../scripts/inbox-status.sh network weather time"
set -g @dracula-show-left-icon session
set -g @dracula-show-fahrenheit false
set -g @dracula-cpu-usage-label "󰻠"
set -g @dracula-ram-usage-label "󰍛"
set -g @dracula-gpu-usage-label "󰢮"
# First colour pair is for gpu-usage.sh, second for inbox-status.sh.
# Pink keeps the GPU segment visually distinct from the cyan ram/network
# neighbors. Light-purple/dark-gray surfaces the inbox triplet without
# competing with the red 'awaiting-input' glyph rendered inside it.
set -g @dracula-custom-plugin-colors "pink dark_gray light_purple dark_gray"

# Status bar ->>1
set -g automatic-rename on
set -g allow-rename on
set -g status-interval 5

# Bindings ->> 1

# Remap prefix from 'C-b' to 'M-a' ->>2
unbind C-b
set-option -g prefix M-a
bind-key C-a send-prefix

# Switch panes using Alt-arrow without prefix ->>2
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Split panes using | and - ->>2
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Start index at 1
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Enable mouse mode ->>1
set -g mouse on

# Update environment variables when attaching (SSH agent, kitty socket)
set-option -g update-environment "SSH_AUTH_SOCK KITTY_LISTEN_ON KITTY_PID KITTY_WINDOW_ID"

# Vi copy mode ->>1
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Run tpm ->>1
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
run -b '~/.tmux/plugins/tpm/tpm'

# Syncronize panes shortcut ->>
bind Z setw synchronize-panes

# Pair-flow cross-session inbox dashboard popup (REQ-F2.1 in specs/pair-flow/).
# `prefix + i` opens a 80% × 70% popup that lists every live Claude session
# across hosts (one row per worktree, sorted + colored per D-22). Display-only
# in v1: any keypress closes the popup.
bind i display-popup -E -w 80% -h 70% "$HOME/.claude/scripts/inbox-dashboard.sh"
